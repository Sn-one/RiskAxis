services:
  web:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    env_file: .env
    ports: ["8000:8000"]
    depends_on: [db]
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: riskaxis
      POSTGRES_USER: riskaxis
      POSTGRES_PASSWORD: riskaxis
    volumes: ["postgres_data:/var/lib/postgresql/data"]
volumes:
  postgres_data:
